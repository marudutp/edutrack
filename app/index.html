<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack.pro - App Engine</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="../js/license-manager.js"></script>

    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --light: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: var(--light);
            margin: 0;
            padding: 20px;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100000;
        }

        #tirai-pembayaran {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .tirai-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .container {
            max-width: 850px;
            margin: auto;
            display: none;
        }

        .id-card {
            width: 320px;
            height: 500px;
            background: white;
            border-radius: 20px;
            border: 1px solid #ccc;
            margin: 20px auto;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: none;
        }

        .table-container {
            max-height: 450px;
            overflow-y: auto;
            background: white;
            border-radius: 10px;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        .cloud-badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
        }

        .btn-sync {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div id="loading-screen">Menghubungkan ke Cloud Engine...</div>

    <div id="tirai-pembayaran">
        <div class="tirai-content">
            <h2>Akses Terkunci, Lur! 🙏</h2>
            <p id="pesan-tirai"></p>
            <div
                style="background:#fff3cd; padding:15px; border-radius:10px; margin:20px 0; border:2px dashed #ffc107;">
                BCA 5700169644 <br> a/n Marudut Panggabean
                <button onclick="window.open('https://wa.me/628123456789')"
                    style="width:100%; margin-top:10px; background:#25D366; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Kirim
                    Bukti WA</button>
            </div>
            <input type="text" id="input-token" style="width:100%; padding:10px; margin-bottom:10px;"
                placeholder="Masukkan Token Aktivasi...">
            <button onclick="prosesAktivasi()"
                style="width:100%; background:#007bff; color:white; border:none; padding:12px; border-radius:5px;">Aktifkan
                Sekarang</button>
        </div>
    </div>

    <div class="container" id="main-app">
        <div style="text-align: right;"><span class="cloud-badge">PRO CLOUD ACTIVE</span></div>

        <img id="ui-logo" src="" style="width:80px; display:none; margin: 0 auto 10px auto; border-radius: 50%;">
        <h1 id="ui-school-name">Memuat Sekolah...</h1>

        <button class="btn-sync" onclick="syncDataLama()">
            <i class="fas fa-sync"></i> Sync Data
        </button>

        <div
            style="padding: 20px; background:white; border-radius:12px; text-align:left; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 20px;">
            <h3>ID Card Generator</h3>
            <input type="text" id="inputNama" placeholder="Nama Siswa..."
                style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="date" id="inputJoinDate" style="width:100%; padding:10px; margin-bottom:10px;">
            <button onclick="generateIDCard()"
                style="width:100%; background:var(--primary); color:white; border:none; padding:12px; border-radius:5px;">Buat
                Kartu</button>
        </div>

        <div id="id-card-result">
            <div id="printableCard" class="id-card">
                <div id="card-header" style="background:var(--primary); color:white; padding:20px; font-weight:bold;">
                    <img id="card-logo" src=""
                        style="width:50px; height:50px; border-radius:50%; border:2px solid white; object-fit: cover;"><br>
                    <span id="card-school-name"></span>
                </div>
                <div style="padding:20px;">
                    <div id="qrcode" style="display:flex; justify-content:center; margin:20px 0;"></div>
                    <div id="displayNama" style="font-size:22px; font-weight:bold;"></div>
                    <div style="color:#666;">Joined: <span id="displayJoinDate"></span></div>
                </div>
            </div>
        </div>

        <hr style="margin:40px 0; border:1px dashed #ccc;">

        <h3>Scanner & Jurnal Cloud</h3>
        <button id="start-btn" onclick="startScanner()"
            style="width:100%; background:#28a745; color:white; border:none; padding:15px; border-radius:10px; font-weight:bold;">Mulai
            Absensi</button>
        <div id="reader"></div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Siswa</th>
                        <th>Waktu</th>
                        <th>Catatan</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // GLOBAL VARS
        let html5QrCode;
        let schoolUUID = null;

        // 1. JALANKAN SATPAM PUSAT
        // window.addEventListener('DOMContentLoaded', async () => {
        //     await initApp(); // Fungsi di license-manager.js

        //     // Setelah initApp selesai, data school ada di window.schoolData
        //     if (window.schoolData) {
        //         const s = window.schoolData;
        //         schoolUUID = s.id; // UUID untuk database

        //         // Update Branding UI
        //         document.getElementById('ui-school-name').innerText = s.name;

        //         if (s.logo_url) {
        //             const logoPath = `../${s.logo_url}`;
        //             document.getElementById('ui-logo').src = logoPath;
        //             document.getElementById('ui-logo').style.display = 'block';
        //             document.getElementById('card-logo').src = logoPath;
        //         }

        //         if (s.theme_color) {
        //             document.documentElement.style.setProperty('--primary', s.theme_color);
        //         }

        //         // Load Data Awal
        //         renderTable();
        //     }
        // });
        window.addEventListener('DOMContentLoaded', async () => {
            console.log("1. DOM Loaded - Memulai initApp...");
            await initApp();
            console.log("2. initApp Selesai. Data school:", window.schoolData);
            console.log("Daftar kunci properti yang ada:", Object.keys(window.schoolData));
            if (window.schoolData) {
                const s = window.schoolData;
                schoolUUID = s.id;
                console.log("3. schoolUUID yang diset:", schoolUUID);

                // Branding UI
                document.getElementById('ui-school-name').innerText = s.name;
                document.getElementById('card-school-name').innerText = s.name;
                // ... (sisanya tetap sama)

                console.log("4. Memanggil renderTable...");
                renderTable();
            } else {
                console.error("EROR: window.schoolData tidak ditemukan!");
            }
        });

        // 2. FITUR SYNC (RESTORED)
        async function syncDataLama() {
            // 1. Definisikan Nama Sekolah secara dinamis dari window.schoolData
            // Jika data belum siap, kita beri nama standar "Sekolah"
            const namaSekolah = (window.schoolData && window.schoolData.name) ? window.schoolData.name : "Sekolah";

            let keyDinamis = `logs_${clientId}`;
            let localLogs = JSON.parse(localStorage.getItem(keyDinamis)) || [];

            // Logika khusus Legacy SDA Music
            if (clientId === 'sda-music' && localLogs.length === 0) {
                localLogs = JSON.parse(localStorage.getItem('sda_logs')) || [];
            }

            // Gunakan variabel namaSekolah agar tidak ReferenceError
            if (localLogs.length === 0) {
                return alert(`Nggak ada data lama untuk ${namaSekolah} di browser ini, Lur.`);
            }

            const btnSync = document.querySelector('.btn-sync');
            const originalText = btnSync.innerHTML;
            btnSync.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sinkronisasi...';
            btnSync.disabled = true;

            const cloudReady = localLogs.map(l => ({
                school_id: schoolUUID,
                student_info: l.info,
                note: l.note || '',
                created_at: l.ts
            }));

            try {
                const { error } = await _supabase.from('attendance_logs').insert(cloudReady);

                if (!error) {
                    alert(`Sukses! ${localLogs.length} data ${namaSekolah} sudah aman di Cloud.`);

                    // Hapus key yang relevan saja
                    localStorage.removeItem(keyDinamis);
                    if (clientId === 'sda-music') localStorage.removeItem('sda_logs');

                    renderTable();
                } else {
                    alert("Gagal sinkron, cek koneksi internet Sampeyan.");
                }
            } catch (err) {
                console.error(err);
                alert("Terjadi kesalahan teknis.");
            } finally {
                btnSync.innerHTML = originalText;
                btnSync.disabled = false;
            }
        }

        // 3. LOGIKA SCANNER & JURNAL (ASLI SAMPEYAN)
        async function startScanner() {
            document.getElementById('start-btn').style.display = 'none';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                saveDataCloud(text);
            });
        }

        // async function renderTable() {
        //     if (!schoolUUID) return;console.log("Mencari data untuk UUID:", schoolUUID); // <-- Tambahkan ini
        //     const { data: logs, error } = await _supabase
        //         .from('attendance_logs')
        //         .select('*')
        //         .eq('school_id', schoolUUID)
        //         .order('created_at', { ascending: false });

        //     if (!error) {
        //         document.getElementById('historyBody').innerHTML = logs.map(i => `
        //         <tr>
        //             <td><strong>${i.student_info}</strong></td>
        //             <td>${new Date(i.created_at).toLocaleString('id-ID')}</td>
        //             <td>
        //                 <div style="display:flex; gap:5px;">
        //                     <input type="text" id="note-${i.id}" value="${i.note || ''}" style="width:100%; border:1px solid #ddd;">
        //                     <button onclick="saveNoteCloud(${i.id})" style="background:var(--success); color:white; border:none; padding:5px;">Simpan</button>
        //                 </div>
        //             </td>
        //         </tr>`).join('');
        //     }
        // }

        async function renderTable() {
            console.log("5. renderTable sedang berjalan...");

            if (!schoolUUID) {
                console.error("6. renderTable BERHENTI: schoolUUID kosong!");
                return;
            }

            console.log("7. Mengambil data dari Supabase untuk ID:", schoolUUID);

            const { data: logs, error } = await _supabase
                .from('attendance_logs')
                .select('*')
                .eq('school_id', schoolUUID)
                .order('created_at', { ascending: false });

            if (error) {
                console.error("8. Supabase Error:", error);
            } else {
                console.log("9. Data berhasil ditarik. Jumlah:", logs.length);

                document.getElementById('historyBody').innerHTML = logs.map(i => `
        <tr>
            <td><strong>${i.student_info}</strong></td>
            <td>${new Date(i.created_at).toLocaleString('id-ID')}</td>
            <td>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="note-${i.id}" value="${i.note || ''}" style="width:100%; border:1px solid #ddd;">
                    <button onclick="saveNoteCloud(${i.id})" style="background:var(--success); color:white; border:none; padding:5px;">Simpan</button>
                </div>
            </td>
        </tr>`).join('');
            }
        }

        async function saveDataCloud(val) {
            const { error } = await _supabase
                .from('attendance_logs')
                .insert([{ school_id: schoolUUID, student_info: val }]);
            if (!error) { renderTable(); beep(); }
        }

        async function saveNoteCloud(logId) {
            const noteVal = document.getElementById(`note-${logId}`).value;
            const { error } = await _supabase
                .from('attendance_logs')
                .update({ note: noteVal })
                .eq('id', logId);
            if (!error) alert("Catatan disimpan!");
        }

        // 4. GENERATOR KARTU (ASLI SAMPEYAN)
        function generateIDCard() {
            const nama = document.getElementById('inputNama').value;
            const join = document.getElementById('inputJoinDate').value;
            if (!nama || !join) return alert("Data belum lengkap!");

            document.getElementById('displayNama').innerText = nama;
            document.getElementById('displayJoinDate').innerText = join;
            document.getElementById('printableCard').style.display = 'block';
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `${clientId}-${nama}`, width: 160, height: 160 });
        }

        function beep() {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            osc.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        }
    </script>
</body>

</html>
