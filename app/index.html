<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack.pro - App Engine</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="../js/license-manager.js"></script>

    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --light: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: var(--light);
            margin: 0;
            padding: 20px;
        }

        /* Loading Screen Full Page */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100000;
        }

        /* Tirai Pembayaran */
        #tirai-pembayaran {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .tirai-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .container {
            max-width: 850px;
            margin: auto;
            display: none;
            /* Akan dibuka oleh license-manager.js */
        }

        .id-card {
            width: 320px;
            height: 500px;
            background: white;
            border-radius: 20px;
            border: 1px solid #ccc;
            margin: 20px auto;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: none;
        }

        .table-container {
            max-height: 450px;
            overflow-y: auto;
            background: white;
            border-radius: 10px;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        .cloud-badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="loading-screen">Menghubungkan ke Cloud Engine...</div>

    <div id="tirai-pembayaran">
        <div class="tirai-content">
            <h2>Akses Terkunci, Lur! 🙏</h2>
            <p id="pesan-tirai"></p>
            <div style="background:#fff3cd; padding:15px; border-radius:10px; margin:20px 0; border:2px dashed #ffc107;">
                BCA 5700169644 <br> a/n Marudut Panggabean
                <button onclick="kirimBuktiWA()" style="width:100%; margin-top:10px; background:#25D366; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Kirim Bukti WA</button>
            </div>
            <input type="text" id="input-token" style="width:100%; padding:10px; margin-bottom:10px;" placeholder="Masukkan Token Aktivasi...">
            <button onclick="prosesAktivasi()" style="width:100%; background:#007bff; color:white; border:none; padding:12px; border-radius:5px;">Aktifkan Sekarang</button>
        </div>
    </div>

    <div class="container" id="main-app">
        <div style="text-align: right;"><span class="cloud-badge">PRO CLOUD ACTIVE</span></div>
        <img id="ui-logo" src="" style="width:80px; display:none; margin: 0 auto 10px auto;">
        <h1 id="ui-school-name">Memuat Sekolah...</h1>

        <div style="padding: 20px; background:white; border-radius:12px; text-align:left; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <h3>ID Card Generator</h3>
            <input type="text" id="inputNama" placeholder="Nama Siswa..." style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="date" id="inputJoinDate" style="width:100%; padding:10px; margin-bottom:10px;">
            <button onclick="generateIDCard()" style="width:100%; background:var(--primary); color:white; border:none; padding:12px; border-radius:5px;">Buat Kartu</button>
        </div>

        <div id="id-card-result">
            <div id="printableCard" class="id-card">
                <div style="background:var(--primary); color:white; padding:20px; font-weight:bold;">
                    <img id="card-logo" src="" style="width:50px; height:50px; border-radius:50%; border:2px solid white;"><br>
                    <span id="card-school-name"></span>
                </div>
                <div style="padding:20px;">
                    <div id="qrcode" style="display:flex; justify-content:center; margin:20px 0;"></div>
                    <div id="displayNama" style="font-size:22px; font-weight:bold;"></div>
                    <div style="color:#666;">Joined: <span id="displayJoinDate"></span></div>
                </div>
            </div>
        </div>

        <hr style="margin:40px 0; border:1px dashed #ccc;">

        <h3>Scanner & Jurnal Cloud</h3>
        <button id="start-btn" onclick="startScanner()" style="width:100%; background:#28a745; color:white; border:none; padding:15px; border-radius:10px; font-weight:bold;">Mulai Absensi</button>
        <div id="reader"></div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Siswa</th><th>Waktu</th><th>Catatan</th></tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // JALANKAN SATPAM PUSAT
        initApp(); // Fungsi ini ada di license-manager.js

        // LOGIKA KHUSUS APP (SCANNER & JURNAL)
        let html5QrCode;
        let schoolUUID = null;

        async function startScanner() {
            document.getElementById('start-btn').style.display = 'none';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                saveDataCloud(text);
            });
        }

        async function renderTable() {
            const { data: logs, error } = await _supabase
                .from('attendance_logs')
                .select('*')
                .eq('school_id', schoolUUID) // schoolUUID didapat dari initApp/license-manager
                .order('created_at', { ascending: false });

            if (!error) {
                document.getElementById('historyBody').innerHTML = logs.map(i => `
                <tr>
                    <td><strong>${i.student_info}</strong></td>
                    <td>${new Date(i.created_at).toLocaleString('id-ID')}</td>
                    <td>
                        <div style="display:flex; gap:5px;">
                            <input type="text" id="note-${i.id}" value="${i.note || ''}" style="width:100%; border:1px solid #ddd;">
                            <button onclick="saveNoteCloud(${i.id})" style="background:var(--success); color:white; border:none; padding:5px;">Simpan</button>
                        </div>
                    </td>
                </tr>`).join('');
            }
        }

        async function saveDataCloud(val) {
            const { error } = await _supabase
                .from('attendance_logs')
                .insert([{ school_id: schoolUUID, student_info: val }]);
            if (!error) { renderTable(); beep(); }
        }

        function generateIDCard() {
            const nama = document.getElementById('inputNama').value;
            const join = document.getElementById('inputJoinDate').value;
            if (!nama || !join) return alert("Data belum lengkap!");
            
            document.getElementById('displayNama').innerText = nama;
            document.getElementById('displayJoinDate').innerText = join;
            document.getElementById('printableCard').style.display = 'block';
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `${clientId}-${nama}`, width: 160, height: 160 });
        }

        function beep() {
            const ctx = new AudioContext(); 
            const osc = ctx.createOscillator(); 
            osc.connect(ctx.destination); 
            osc.start(); 
            osc.stop(ctx.currentTime + 0.1);
        }
    </script>
</body>
</html>
