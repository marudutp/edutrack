<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack.pro - Cloud Loading...</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* CSS TETAP SAMA DENGAN VERSI SEBELUMNYA (CENTERED ID CARD & TIRAI) */
        :root {
            --primary: #007bff;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --light: #f0f2f5;
            --dark: #333;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 20px;
            background: var(--light);
            margin: 0;
        }

        .container {
            max-width: 850px;
            margin: auto;
            padding-bottom: 50px;
            display: none;
        }

        #tirai-pembayaran {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .tirai-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .school-logo-main {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            margin-bottom: 15px;
            display: none;
            margin: 0 auto 15px auto;
        }

        /* --- Bagian CSS di index.html --- */

        .id-card {
            width: 320px;
            height: 500px;
            background: white;
            border-radius: 20px;
            border: 1px solid #ccc;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            display: none;
            margin-bottom: 20px;

            /* --- TAMBAHKAN DUA BARIS INI, LUR! --- */
            margin-left: auto;
            margin-right: auto;
            /* ------------------------------------- */
        }

        .table-container {
            max-height: 450px;
            overflow-y: auto;
            background: white;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        .cloud-badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            /* Rata tengah secara horizontal (flex) */
            align-items: center;
            /* Rata tengah secara vertical (flex) */
            margin: 20px auto;
            /* Margin atas-bawah 20px, kiri-kanan auto */
            padding: 10px;
            width: 100%;
            /* Pastikan ambil lebar penuh kartu */
            box-sizing: border-box;
        }

        
    </style>
</head>

<body>

    <div id="loading-screen">Menghubungkan ke Cloud Engine...</div>

    <div id="tirai-pembayaran">
        <div class="tirai-content">
            <h2>Masa Aktif Habis, Lur! 🙏</h2>
            <p id="pesan-tirai"></p>
            <div
                style="background:#fff3cd; padding:15px; border-radius:10px; margin:20px 0; border:2px dashed #ffc107;">
                BCA 48932849390 <br> a/n Marudut Panggabean
                <button onclick="kirimBuktiWA()"
                    style="width:100%; margin-top:10px; background:#25D366; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Kirim
                    Bukti WA</button>
            </div>
            <input type="text" id="input-token" style="width:100%; padding:10px; margin-bottom:10px;"
                placeholder="Masukkan Token Aktivasi...">
            <button onclick="prosesAktivasi()"
                style="width:100%; background:#007bff; color:white; border:none; padding:12px; border-radius:5px;">Aktifkan</button>
        </div>
    </div>

    <div class="container" id="main-app">
        <div style="text-align: right; margin-bottom: 10px;"><span class="cloud-badge">PRO CLOUD ACTIVE</span></div>
        <img id="ui-logo" src="" class="school-logo-main">
        <h1 id="ui-school-name">School Name</h1>

        <div class="card"
            style="padding: 20px; background:white; border-radius:12px; text-align:left; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <h3>ID Card Generator</h3>
            <input type="text" id="inputNama" placeholder="Nama Siswa..."
                style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="date" id="inputJoinDate" style="width:100%; padding:10px; margin-bottom:10px;">
            <button onclick="generateIDCard()"
                style="width:100%; background:#007bff; color:white; border:none; padding:12px; border-radius:5px;">Generate</button>
        </div>

        <div id="id-card-result" style="margin-top:20px;">
            <div id="printableCard" class="id-card">
                <div style="background:var(--primary); color:white; padding:20px; font-weight:bold;">
                    <img id="card-logo" src=""
                        style="width:50px; height:50px; border-radius:50%; border:2px solid white;"><br>
                    <span id="card-school-name"></span>
                </div>
                <div style="padding:20px;">
                    <div id="qrcode"></div>
                    <div id="displayNama" style="font-size:22px; font-weight:bold; margin-top:10px;"></div>
                    <div style="color:#666;">Joined: <span id="displayJoinDate"></span></div>
                </div>
            </div>
            <div id="actionButtons" style="display:none; gap:10px; justify-content:center;">
                <button onclick="window.print()">Cetak</button>
                <button onclick="downloadImage()">PNG</button>
                <button onclick="shareImage()">Share</button>
            </div>
        </div>

        <hr style="margin:40px 0; border:1px dashed #ccc;">

        <h3>Scanner & Jurnal Cloud</h3>
        <button id="start-btn" onclick="startScanner()"
            style="width:100%; background:#28a745; color:white; border:none; padding:15px; border-radius:10px; font-weight:bold;">Buka
            Kamera</button>
        <div id="reader"></div>

        <div style="margin:20px 0; display:flex; gap:10px;">
            <input type="text" id="searchInput" placeholder="Cari nama..." oninput="renderTable()"
                style="flex:1; padding:12px; border-radius:8px; border:1px solid #ddd;">
            <button onclick="syncDataLama()"
                style="background:#17a2b8; color:white; border:none; padding:10px; border-radius:8px; font-size:12px;">Sync
                Data Lokal</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Siswa</th>
                        <th>Waktu</th>
                        <th>Catatan</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = 'https://fcjmcqwlaauuoheggjpp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjam1jcXdsYWF1dW9oZWdnanBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDU3OTQsImV4cCI6MjA5Mjk4MTc5NH0.SbisuJx1bfWUxcMhoqyLjpECPqtZHeRaPa6vAePGIdY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let config = {};
        let schoolUUID = null;
        const urlParams = new URLSearchParams(window.location.search);
        const clientId = urlParams.get('id') || 'sda-music';
        const SALT = "EDUTRACK-V3-SECRET";

        // 1. LOAD FROM CLOUD
        async function loadConfig() {
            try {
                const { data: school, error } = await _supabase
                    .from('schools')
                    .select('*')
                    .eq('slug', clientId)
                    .single();

                if (error || !school) throw new Error("Not Found");

                config = school;
                schoolUUID = school.id;

                // Re-mapping agar kode lama tidak banyak berubah
                config.school_name = school.name;
                config.joinedDate = school.joined_date;
                config.tokenHash = school.token_hash;
                config.delete_password = school.delete_password;

                if (await checkLicense()) applyConfig();
            } catch (err) {
                document.getElementById('loading-screen').innerText = "Institusi belum terdaftar di Cloud, Lur.";
            }
        }

        async function checkLicense() {
            const diffDays = Math.ceil(Math.abs(new Date() - new Date(config.joined_date)) / (1000 * 60 * 60 * 24));
            const storedToken = localStorage.getItem(`token_${clientId}`);
            if (diffDays > 30) {
                if (!(await validateToken(storedToken, config.token_hash))) {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('pesan-tirai').innerText = `Masa trial ${config.name} sudah habis.`;
                    document.getElementById('tirai-pembayaran').style.display = 'flex';
                    return false;
                }
            }
            return true;
        }

        async function validateToken(token, targetHash) {
            if (!token || !targetHash) return false;
            const msgUint8 = new TextEncoder().encode(token + SALT);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex === targetHash;
        }

        function applyConfig() {
            document.title = config.name + " - EduTrack Pro";
            document.getElementById('ui-school-name').innerText = config.name;
            document.getElementById('card-school-name').innerText = config.name;
            document.documentElement.style.setProperty('--primary', config.theme_color);
            if (config.logo_url) {
                document.getElementById('ui-logo').src = "../" + config.logo_url;
                document.getElementById('ui-logo').style.display = 'block';
                document.getElementById('card-logo').src = "../" + config.logo_url;
            }
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            renderTable();
        }

        // 2. CLOUD LOGS LOGIC
        async function renderTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const { data: logs, error } = await _supabase
                .from('attendance_logs')
                .select('*')
                .eq('school_id', schoolUUID)
                .order('created_at', { ascending: false });

            if (error) return;
            const filtered = logs.filter(l => l.student_info.toLowerCase().includes(search));
            document.getElementById('historyBody').innerHTML = filtered.map(i => `
            <tr>
                <td><strong>${i.student_info}</strong></td>
                <td>${new Date(i.created_at).toLocaleString('id-ID')}</td>
                <td>
                    <div style="display:flex; gap:5px;">
                        <input type="text" id="note-${i.id}" value="${i.note || ''}" style="width:100%; border:1px solid #ddd; padding:5px;">
                        <button onclick="saveNoteCloud(${i.id})" style="background:var(--success); color:white; border:none; padding:5px; border-radius:4px;">Save</button>
                    </div>
                </td>
            </tr>`).join('');
        }

        async function saveDataCloud(val) {
            const { error } = await _supabase
                .from('attendance_logs')
                .insert([{ school_id: schoolUUID, student_info: val }]);
            if (!error) { renderTable(); beep(); return true; }
            return false;
        }

        async function saveNoteCloud(logId) {
            const noteText = document.getElementById(`note-${logId}`).value;
            const { error } = await _supabase
                .from('attendance_logs')
                .update({ note: noteText })
                .eq('id', logId);
            if (!error) alert("Catatan disimpan di Cloud!");
        }

        // 3. MIGRATION LOGIC (SAVE THE OLD DATA!)
        async function syncDataLama() {
            let localLogs = JSON.parse(localStorage.getItem(`logs_${clientId}`)) ||
                JSON.parse(localStorage.getItem('sda_logs')) || [];

            if (localLogs.length === 0) return alert("Nggak ada data lama di browser ini, Lur.");

            const cloudReady = localLogs.map(l => ({
                school_id: schoolUUID,
                student_info: l.info,
                note: l.note || '',
                created_at: l.ts
            }));

            const { error } = await _supabase.from('attendance_logs').insert(cloudReady);
            if (!error) {
                alert("Sinkronisasi Berhasil! Data lama sudah aman di Cloud.");
                localStorage.removeItem(`logs_${clientId}`);
                renderTable();
            } else {
                alert("Gagal sinkron, cek koneksi internet Sampeyan.");
            }
        }

        // --- FITUR SCANNER & ID CARD TETAP SAMA ---
        let html5QrCode;
        function startScanner() {
            document.getElementById('start-btn').style.display = 'none';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                saveDataCloud(text);
            });
        }

        function generateIDCard() {
            const nama = document.getElementById('inputNama').value;
            const join = document.getElementById('inputJoinDate').value;
            if (!nama || !join) return alert("Lengkapi data!");
            document.getElementById('displayNama').innerText = nama;
            document.getElementById('displayJoinDate').innerText = join;
            document.getElementById('printableCard').style.display = 'block';
            document.getElementById('actionButtons').style.display = 'flex';
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `${clientId}-${nama}`, width: 160, height: 160 });
        }

        function beep() {
            const ctx = new AudioContext(); const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1);
        }

        loadConfig();
    </script>
</body>

</html>
