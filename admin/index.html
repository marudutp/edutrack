<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>EduTrack - Super Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 30px; background: #f1f5f9; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; color: #64748b; font-size: 14px; }
        .stat-card p { margin: 10px 0 0; font-size: 28px; font-weight: bold; color: #1e293b; }
        table { width: 100%; background: white; border-radius: 12px; border-collapse: collapse; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #4f46e5; color: white; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .active { background: #dcfce7; color: #166534; }
        .trial { background: #fef9c3; color: #854d0e; }
        .btn-action { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <h1>EduTrack Command Center</h1>
    
    <div class="stat-grid">
        <div class="stat-card"><h3>Total Institusi</h3><p id="count-school">0</p></div>
        <div class="stat-card"><h3>Total Scan Absen</h3><p id="count-logs">0</p></div>
        <div class="stat-card"><h3>Total Pendapatan (Estimasi)</h3><p id="total-revenue">Rp 0</p></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Sekolah / Slug</th>
                <th>Tgl Gabung</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="school-list"></tbody>
    </table>

    <script>
        const SUPABASE_URL = 'https://fcjmcqwlaauuoheggjpp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjam1jcXdsYWF1dW9oZWdnanBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDU3OTQsImV4cCI6MjA5Mjk4MTc5NH0.SbisuJx1bfWUxcMhoqyLjpECPqtZHeRaPa6vAePGIdY';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadStats() {
            // Hitung Sekolah
            const { count: sCount } = await _supabase.from('schools').select('*', { count: 'exact', head: true });
            document.getElementById('count-school').innerText = sCount;

            // Hitung Logs
            const { count: lCount } = await _supabase.from('attendance_logs').select('*', { count: 'exact', head: true });
            document.getElementById('count-logs').innerText = lCount;

            // List Sekolah
            const { data: schools } = await _supabase.from('schools').select('*').order('joined_date', { ascending: false });
            
            document.getElementById('school-list').innerHTML = schools.map(s => `
                <tr>
                    <td><strong>${s.name}</strong><br><small>${s.slug}</small></td>
                    <td>${s.joined_date}</td>
                    <td><span class="badge ${s.license_status === 'active' ? 'active' : 'trial'}">${s.license_status.toUpperCase()}</span></td>
                    <td>
                        <button class="btn-action" style="background:#4f46e5; color:white;" onclick="updateLicense('${s.id}', 'active')">Aktifkan</button>
                        <button class="btn-action" style="background:#ef4444; color:white;" onclick="updateLicense('${s.id}', 'trial')">Suspend</button>
                    </td>
                </tr>
            `).join('');
        }

        async function updateLicense(id, status) {
            const { error } = await _supabase.from('schools').update({ license_status: status }).eq('id', id);
            if (!error) { alert("Status diperbarui!"); loadStats(); }
        }

        loadStats();
    </script>
</body>
</html>
